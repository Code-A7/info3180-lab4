{% extends 'base.html' %}

{% block css %}
<style>
  .image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 20px;
  }

  .image-grid img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  @media (max-width: 768px) {
    .image-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 480px) {
    .image-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
{% endblock %}

{% block main %}
<h1 class="page-header">Uploaded Images</h1>

{% include 'flash_messages.html' %}

{% if images %}
  <div class="image-grid">
    {% for image in images %}
      <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}">
    {% endfor %}
  </div>
{% else %}
  <p>No images have been uploaded yet. <a href="{{ url_for('upload') }}">Upload one now!</a></p>
{% endif %}
{% endblock %}
